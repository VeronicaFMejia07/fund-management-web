<div class="funds">
  <app-atom-label class="funds__title" [text]="'Fondos Disponibles'" />
  
  <div class="funds__balance">
    <app-atom-label class="funds__balance-label" [text]="'Saldo actual:'" />
    <app-atom-label class="funds__balance-value" [text]="(currentBalance() | currency:'COP':'symbol-narrow': '1.0-0') || '' " />
  </div>

  <div class="funds__container-table">
    <app-organism-table [columns]="columns" [data]="funds()">
        <ng-template #actions let-rowData>
          <app-molecule-button-icon [label]="'Suscribirse'" [iconClass]="'pi pi-plus'" (onClick)="onOpenModal(rowData)" />
        </ng-template>
    </app-organism-table>
  </div>

  <app-organism-modal 
    [title]="'Nueva Suscripción'"
    [(visible)]="isModalVisible" 
    [contentTemplate]="contentConfirmSubscription"
    [footerTemplate]="footerConfirmSubscription">
  </app-organism-modal>

</div>

<ng-template #contentConfirmSubscription>
  <div class="funds__subscription">
    <app-atom-label [text]="'Para suscribirte, por favor selecciona tu método de notificación.'" />
    <app-atom-label class="funds__subscription-label" [text]="'Método de notificación:'" />
    <app-atom-select [options]="subscriptionOptions" [value]="selectedNotificationMethod" (valueChange)="onChangeNotificationMethod($event)" />
  </div>
</ng-template>

<ng-template #footerConfirmSubscription>
  <app-molecule-button-icon [label]="'Cancelar'" (onClick)="onCloseModal()" />
  <app-molecule-button-icon [label]="'Confirmar'" (onClick)="onSuscription(selectedFund)" />
</ng-template>
